<app-header pageTitle="Productos" pageIcon="restaurant_menu" pageSubtitle="Gestiona el menú de tu cafetería"></app-header>

<div class="page-content">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="search-box">
        <span class="material-icons-round">search</span>
        <input type="text" [(ngModel)]="searchQuery" placeholder="Buscar productos..." />
      </div>
      <select class="category-filter" [(ngModel)]="selectedCategory">
        <option value="">Todas las categorías</option>
        <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
      </select>
    </div>
    <button class="btn-primary" (click)="openCreateModal()">
      <span class="material-icons-round">add</span>
      Nuevo Producto
    </button>
  </div>

  <!-- Products Grid -->
  <div class="products-grid">
    <div class="product-card" *ngFor="let product of filteredProducts" [class.unavailable]="!product.available">
      <!-- Product Image -->
      <div class="product-image-wrap">
        <img *ngIf="product.imageUrl" [src]="product.imageUrl" [alt]="product.name" class="product-image" />
        <div *ngIf="!product.imageUrl" class="product-image-placeholder">
          <span class="material-icons-round">photo_camera</span>
          <span class="placeholder-text">Sin imagen</span>
        </div>
        <div class="product-actions-overlay">
          <button class="icon-btn-overlay" (click)="toggleAvailability(product.id)" [title]="product.available ? 'Desactivar' : 'Activar'">
            <span class="material-icons-round">{{ product.available ? 'toggle_on' : 'toggle_off' }}</span>
          </button>
          <button class="icon-btn-overlay" (click)="openEditModal(product)" title="Editar">
            <span class="material-icons-round">edit</span>
          </button>
          <button class="icon-btn-overlay danger" (click)="deleteProduct(product.id)" title="Eliminar">
            <span class="material-icons-round">delete</span>
          </button>
        </div>
      </div>
      <div class="product-card-body">
        <h4 class="product-name">{{ product.name }}</h4>
        <p class="product-desc">{{ product.description }}</p>
        <div class="product-meta">
          <span class="product-category">{{ productService.getCategoryName(product.categoryId) }}</span>
          <span class="product-price">${{ product.price }}</span>
        </div>
      </div>
      <div class="product-status" *ngIf="!product.available">
        <span class="material-icons-round">block</span> No disponible
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="filteredProducts.length === 0">
    <span class="material-icons-round">inventory_2</span>
    <p>No se encontraron productos</p>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ editingProduct ? 'Editar Producto' : 'Nuevo Producto' }}</h3>
      <button class="modal-close" (click)="closeModal()">
        <span class="material-icons-round">close</span>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" [(ngModel)]="formName" placeholder="Nombre del producto" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Categoría</label>
          <select [(ngModel)]="formCategory">
            <option value="">Seleccionar...</option>
            <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Precio ($)</label>
          <input type="number" [(ngModel)]="formPrice" min="0" step="0.5" />
        </div>
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <textarea [(ngModel)]="formDescription" rows="3" placeholder="Descripción corta..."></textarea>
      </div>
      <div class="form-group">
        <label>URL de Imagen</label>
        <input type="text" [(ngModel)]="formImage" placeholder="https://ejemplo.com/imagen.jpg" />
        <div class="image-preview-small" *ngIf="formImage">
          <img [src]="formImage" alt="Vista previa" />
        </div>
      </div>
      <div class="form-group checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="formAvailable" />
          <span>Producto disponible</span>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" (click)="closeModal()">Cancelar</button>
      <button class="btn-primary" (click)="saveProduct()">
        {{ editingProduct ? 'Guardar cambios' : 'Crear producto' }}
      </button>
    </div>
  </div>
</div>
