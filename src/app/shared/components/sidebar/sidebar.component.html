<aside class="sidebar" [class.collapsed]="collapsed">
  <!-- Logo / Brand -->
  <div class="sidebar-brand">
    <span class="material-icons-round brand-icon">coffee</span>
    <span class="brand-text" *ngIf="!collapsed">Café Aroma</span>
  </div>

  <!-- Toggle Button -->
  <button class="sidebar-toggle" (click)="toggleCollapse()" [attr.aria-label]="collapsed ? 'Expandir menú' : 'Colapsar menú'">
    <span class="material-icons-round">{{ collapsed ? 'chevron_right' : 'chevron_left' }}</span>
  </button>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <a *ngFor="let item of visibleItems"
       [routerLink]="item.route"
       routerLinkActive="active"
       class="nav-item"
       [title]="item.label">
      <span class="material-icons-round nav-icon">{{ item.icon }}</span>
      <span class="nav-label" *ngIf="!collapsed">{{ item.label }}</span>
      <!-- Badge para notificaciones -->
      <span class="nav-badge" *ngIf="item.route === '/notifications' && notifService.unreadCount() > 0 && !collapsed">
        {{ notifService.unreadCount() }}
      </span>
    </a>
  </nav>

  <!-- User Section -->
  <div class="sidebar-footer">
    <div class="user-info" *ngIf="!collapsed">
      <div class="user-avatar">
        <span class="material-icons-round">person</span>
      </div>
      <div class="user-details">
        <span class="user-name">{{ auth.userName() }}</span>
        <span class="user-role">{{ auth.userRole() | titlecase }}</span>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()" title="Cerrar sesión">
      <span class="material-icons-round">logout</span>
      <span *ngIf="!collapsed">Salir</span>
    </button>
  </div>
</aside>
